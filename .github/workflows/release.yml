name: Release

# Runs when you publish a GitHub Release. It tests the workspace, builds the
# optimized Windows .exe (with the embedded icon + version metadata from
# build.rs / winres), and attaches the binary to the release that triggered it.
on:
  release:
    types: [published]

# Needed so the workflow can upload the built .exe back onto the release.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Release-mode tests so the optimized build below reuses these artifacts.
      - name: Run tests
        run: cargo test --workspace --release

      # Windows ships the wgpu (DX12) backend. Pinned explicitly rather than
      # relying on the crate default so the per-OS split (Windows = wgpu,
      # Linux = glow, see the deb/arch jobs below) stays intentional even if
      # the default renderer feature ever changes.
      - name: Build release exe
        run: cargo build --release -p FastTIFF --no-default-features --features renderer-wgpu

      # Give the asset a versioned name
      - name: Stage artifact
        shell: bash
        run: cp target/release/FastTIFF.exe "FastTIFF.exe"

      - name: Attach exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: FastTIFF.exe
          # to give versioned name:
          # files: FastTIFF-${{ github.event.release.tag_name }}.exe

  # Builds the Debian/Ubuntu .deb with cargo-deb and attaches it to the release,
  # alongside the Windows .exe above. Runs once per architecture on a native
  # runner (no cross-compiling the GTK/GL/X11 stack): ubuntu-latest -> amd64,
  # ubuntu-24.04-arm -> arm64. cargo-deb names each by its arch, so both land
  # on the release without colliding.
  build-linux-deb:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Build-time libs the glow GUI links: GTK3 (rfd file dialog), OpenGL, and
      # the X11 / Wayland / xkbcommon stack winit needs. cargo-deb derives the
      # matching *runtime* package deps from the binary (depends = "$auto").
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgtk-3-dev libgl1-mesa-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxkbcommon-dev libwayland-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      # Maintainer scripts are committed from Windows without the exec bit;
      # dpkg requires them executable.
      - name: Make deb maintainer scripts executable
        run: chmod 0755 FastTIFF/packaging/deb/postinst FastTIFF/packaging/deb/postrm

      # Reads [package.metadata.deb] from FastTIFF/Cargo.toml. Output:
      # target/debian/fasttiff_<version>-1_<amd64|arm64>.deb (per runner arch).
      # Linux ships the glow (OpenGL) backend, not the crate default (wgpu):
      # OpenGL is near-universal on Linux, whereas a wgpu binary needs a Vulkan
      # ICD at runtime that cargo-deb's $auto dep scan can't see (wgpu dlopens
      # libvulkan). cargo-deb forwards these flags to the cargo build it runs.
      - name: Build .deb
        run: cargo deb -p FastTIFF --no-default-features --features renderer-glow

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb

  # Builds a pacman package (.pkg.tar.zst) from FastTIFF/packaging/arch/PKGBUILD when a
  # GitHub Release is published, and attaches it to that release — the Arch
  # counterpart to the .deb / .exe jobs in release.yml.
  #
  # Runs inside an Arch container. makepkg refuses to run as root, so it's driven
  # as an unprivileged user; every dependency is pre-installed, so makepkg needs
  # no sudo/pacman access of its own.
  build-arch:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    steps:
      # base-devel = makepkg + fakeroot etc.; curl for the source download;
      # rust for the build; the rest are the GUI runtime libs (also the
      # PKGBUILD's depends, so makepkg's dep check passes without -s).
      - name: Install build tooling + runtime libs
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel curl git rust \
            gtk3 libglvnd libxkbcommon libx11 libxcursor libxi libxrandr wayland fontconfig

      - name: Checkout
        uses: actions/checkout@v4

      # Build exactly the released commit: pin the git source to the tag.
      # pkgver() in the PKGBUILD derives the version number from Cargo.toml.
      - name: Pin source to released tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: sed -i "s|\.git\")|.git#tag=${TAG}\")|" FastTIFF/packaging/arch/PKGBUILD

      # makepkg clones the tagged source, builds it, and packages.
      - name: Build package
        run: |
          useradd -m builder
          cp FastTIFF/packaging/arch/PKGBUILD /home/builder/PKGBUILD
          chown -R builder:builder /home/builder
          sudo -u builder bash -lc 'cd ~ && makepkg --noconfirm'

      - name: Attach package to release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/builder/*.pkg.tar.zst
