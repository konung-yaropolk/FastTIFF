name: Release

# Runs when you publish a GitHub Release. Builds the app for Windows, Linux
# (.deb + Arch .pkg.tar.zst), and macOS (.dmg, arm64 + x86_64), and attaches
# every artifact to the release that triggered the run.
#
# Icons are generated from FastTIFF/icon/icon.svg at build time — the SVG is the
# single source of truth. Each job rasterizes exactly the icon format it needs
# (Windows .ico, Linux hicolor PNGs, macOS .icns) before the build that consumes
# it, so there are no committed raster files to keep in sync.
on:
  release:
    types: [published]

# Needed so the workflow can upload the built artifacts back onto the release.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # build.rs embeds icon/icon.ico into the .exe via winres, so the .ico must
      # exist before `cargo build`/`cargo test`. Rasterize it from the SVG into a
      # multi-resolution ICO (16-256). rsvg (via the librsvg pip wheel is not a
      # thing on Windows) — use ImageMagick, preinstalled on windows-latest, with
      # its built-in SVG/MSVG delegate.
      - name: Generate Windows icon (.ico) from SVG
        shell: bash
        run: |
          set -euo pipefail
          cd FastTIFF/icon
          for s in 16 32 48 64 128 256; do
            magick -background none icon.svg -resize ${s}x${s} "ico_${s}.png"
          done
          magick ico_16.png ico_32.png ico_48.png ico_64.png ico_128.png ico_256.png icon.ico
          rm -f ico_*.png
          magick identify icon.ico

      # Release-mode tests so the optimized build below reuses these artifacts.
      - name: Run tests
        run: cargo test --workspace --release

      # Windows ships the wgpu (DX12) backend. Pinned explicitly rather than
      # relying on the crate default so the per-OS split (Windows = wgpu,
      # Linux = glow, see the deb/arch jobs below) stays intentional even if
      # the default renderer feature ever changes.
      - name: Build release exe
        run: cargo build --release -p FastTIFF --no-default-features --features renderer-wgpu

      # Give the asset a versioned name
      - name: Stage artifact
        shell: bash
        run: cp target/release/FastTIFF.exe "FastTIFF.exe"

      - name: Attach exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: FastTIFF.exe
          # to give versioned name:
          # files: FastTIFF-${{ github.event.release.tag_name }}.exe

  # Builds the Debian/Ubuntu .deb with cargo-deb and attaches it to the release,
  # alongside the Windows .exe above. Runs once per architecture on a native
  # runner (no cross-compiling the GTK/GL/X11 stack): ubuntu-latest -> amd64,
  # ubuntu-24.04-arm -> arm64. cargo-deb names each by its arch, so both land
  # on the release without colliding.
  build-linux-deb:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Build-time libs the glow GUI links: GTK3 (rfd file dialog), OpenGL, and
      # the X11 / Wayland / xkbcommon stack winit needs. cargo-deb derives the
      # matching *runtime* package deps from the binary (depends = "$auto").
      # librsvg2-bin provides rsvg-convert for the icon generation below.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgtk-3-dev libgl1-mesa-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxkbcommon-dev libwayland-dev \
            librsvg2-bin

      # [package.metadata.deb] lists icon/icon{16,32,48,64,128,256}.png as assets
      # installed into hicolor/. Rasterize them from the SVG before `cargo deb`.
      - name: Generate Linux hicolor icons from SVG
        run: |
          set -euo pipefail
          cd FastTIFF/icon
          for s in 16 32 48 64 128 256; do
            rsvg-convert -w $s -h $s --background-color none icon.svg -o "icon${s}.png"
          done
          ls -la icon*.png

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      # Maintainer scripts are committed from Windows without the exec bit;
      # dpkg requires them executable.
      - name: Make deb maintainer scripts executable
        run: chmod 0755 FastTIFF/packaging/deb/postinst FastTIFF/packaging/deb/postrm

      # Reads [package.metadata.deb] from FastTIFF/Cargo.toml. Output:
      # target/debian/fasttiff_<version>-1_<amd64|arm64>.deb (per runner arch).
      # Linux ships the glow (OpenGL) backend, not the crate default (wgpu):
      # OpenGL is near-universal on Linux, whereas a wgpu binary needs a Vulkan
      # ICD at runtime that cargo-deb's $auto dep scan can't see (wgpu dlopens
      # libvulkan). cargo-deb forwards these flags to the cargo build it runs.
      - name: Build .deb
        run: cargo deb -p FastTIFF --no-default-features --features renderer-glow

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb

  # Builds a pacman package (.pkg.tar.zst) from FastTIFF/packaging/arch/PKGBUILD when a
  # GitHub Release is published, and attaches it to that release — the Arch
  # counterpart to the .deb / .exe jobs in release.yml.
  #
  # Runs inside an Arch container. makepkg refuses to run as root, so it's driven
  # as an unprivileged user; every dependency is pre-installed, so makepkg needs
  # no sudo/pacman access of its own.
  #
  # The PKGBUILD builds from a fresh git clone of the tag, so it rasterizes its
  # own hicolor icons from icon.svg in package() (via librsvg, a makedepend
  # there) — the workflow's generated files aren't visible to makepkg.
  build-arch:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    steps:
      # base-devel = makepkg + fakeroot etc.; curl for the source download;
      # rust for the build; the rest are the GUI runtime libs (also the
      # PKGBUILD's depends, so makepkg's dep check passes without -s).
      - name: Install build tooling + runtime libs
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel curl git rust \
            gtk3 libglvnd libxkbcommon libx11 libxcursor libxi libxrandr wayland fontconfig

      - name: Checkout
        uses: actions/checkout@v4

      # Build exactly the released commit: pin the git source to the tag.
      # pkgver() in the PKGBUILD derives the version number from Cargo.toml.
      - name: Pin source to released tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: sed -i "s|\.git\")|.git#tag=${TAG}\")|" FastTIFF/packaging/arch/PKGBUILD

      # makepkg clones the tagged source, builds it, and packages.
      - name: Build package
        run: |
          useradd -m builder
          cp FastTIFF/packaging/arch/PKGBUILD /home/builder/PKGBUILD
          chown -R builder:builder /home/builder
          sudo -u builder bash -lc 'cd ~ && makepkg --noconfirm'

      - name: Attach package to release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/builder/*.pkg.tar.zst

  # Builds the macOS .app bundle and packages it into a .dmg, then attaches it
  # to the release — the macOS counterpart to the .exe / .deb / pacman jobs above.
  # Runs once per architecture on a native runner (no cross-compiling the Metal /
  # Cocoa stack): macos-14 -> arm64 (Apple Silicon), macos-15-intel -> x86_64.
  # Apple has deprecated x86_64; macos-15-intel is the last Intel image Actions
  # offers (available through ~August 2027), so the Intel job is best-effort and
  # allowed to fail without blocking the arm64 one (fail-fast: false).
  build-macos-dmg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            arch: x86_64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pin the target so the build matches the runner's arch even if the
          # host default ever drifts (belt-and-suspenders on native runners).
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Release-mode tests so the optimized build below reuses these artifacts.
      - name: Run tests
        run: cargo test --workspace --release --target ${{ matrix.target }}

      # macOS ships the wgpu (Metal) backend, matching the crate default and the
      # Windows job. wgpu is preferred on macOS because Apple deprecated OpenGL,
      # so the glow path used for Linux is intentionally NOT used here. Pinned
      # explicitly so the per-OS renderer split stays deliberate.
      - name: Build release binary
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p FastTIFF --no-default-features --features renderer-wgpu

      # Assemble FastTIFF.app by hand (no cargo-bundle dependency): synthesize an
      # Info.plist whose strings mirror [package.metadata.winres] from
      # FastTIFF/Cargo.toml (kept in sync with the embedded Windows metadata),
      # build an .icns rendered natively from icon.svg at every size (no
      # upscaling), and drop the binary in MacOS/. macOS ships rsvg via Homebrew.
      - name: Install icon tooling
        run: brew install librsvg

      - name: Build .app bundle
        shell: bash
        env:
          # Mirror of [package.metadata.winres] — edit both together.
          PRODUCT_NAME: "Fast TIFF Viewer"
          BUNDLE_ID: "com.konung-yaropolk.fasttiff"
          COPYRIGHT: "konung_yaropolk © 2026"
          DESCRIPTION: "Fast TIFF Viewer"
        run: |
          set -euo pipefail
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import sys,json; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"]=="FastTIFF"))')"
          echo "Building FastTIFF.app version $VERSION for ${{ matrix.arch }}"

          APP="FastTIFF.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          # --- binary ---
          cp "target/${{ matrix.target }}/release/FastTIFF" "$APP/Contents/MacOS/FastTIFF"
          chmod +x "$APP/Contents/MacOS/FastTIFF"

          # --- icon: render each iconset slot natively from the SVG (no
          #     upscaling), then iconutil packs the .icns ---
          SVG="FastTIFF/icon/icon.svg"
          ICONSET="FastTIFF.iconset"
          rm -rf "$ICONSET"; mkdir -p "$ICONSET"
          render() { rsvg-convert -w "$1" -h "$1" --background-color none "$SVG" -o "$ICONSET/$2"; }
          render 16   icon_16x16.png
          render 32   icon_16x16@2x.png
          render 32   icon_32x32.png
          render 64   icon_32x32@2x.png
          render 128  icon_128x128.png
          render 256  icon_128x128@2x.png
          render 256  icon_256x256.png
          render 512  icon_256x256@2x.png
          render 512  icon_512x512.png
          render 1024 icon_512x512@2x.png
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/FastTIFF.icns"
          rm -rf "$ICONSET"

          # --- Info.plist ---
          PLIST="$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Clear dict" "$PLIST" 2>/dev/null || true
          add() { /usr/libexec/PlistBuddy -c "Add $1 $2 $3" "$PLIST"; }
          add ":CFBundleName"                  string  "$PRODUCT_NAME"
          add ":CFBundleDisplayName"           string  "$PRODUCT_NAME"
          add ":CFBundleExecutable"            string  "FastTIFF"
          add ":CFBundleIdentifier"            string  "$BUNDLE_ID"
          add ":CFBundleIconFile"              string  "FastTIFF.icns"
          add ":CFBundleShortVersionString"    string  "$VERSION"
          add ":CFBundleVersion"               string  "$VERSION"
          add ":CFBundlePackageType"           string  "APPL"
          add ":CFBundleInfoDictionaryVersion" string  "6.0"
          add ":CFBundleGetInfoString"         string  "$DESCRIPTION"
          add ":NSHumanReadableCopyright"      string  "$COPYRIGHT"
          add ":LSMinimumSystemVersion"        string  "11.0"
          add ":NSHighResolutionCapable"       bool    true

          plutil -lint "$PLIST"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      # Ad-hoc code-sign so the app launches on the build arch without an
      # "is damaged" Gatekeeper error from a totally unsigned bundle. This is
      # NOT notarized — end users on another Mac will still need to right-click
      # -> Open (or `xattr -dr com.apple.quarantine`) the first time. Real
      # notarization needs an Apple Developer ID cert.
      - name: Ad-hoc sign the app
        run: codesign --force --deep --sign - "FastTIFF.app"

      # Stage the .app in a clean folder with an /Applications symlink so the
      # DMG opens showing the familiar "drag to Applications" layout, then build
      # a compressed (UDZO) read-only image with hdiutil (first-party tooling).
      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail
          STAGE="dmg_stage"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          cp -R "FastTIFF.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          DMG="FastTIFF-${APP_VERSION}-${{ matrix.arch }}.dmg"
          rm -f "$DMG"
          hdiutil create -volname "Fast TIFF Viewer" \
            -srcfolder "$STAGE" -fs HFS+ -format UDZO -imagekey zlib-level=9 \
            "$DMG"
          echo "DMG_NAME=$DMG" >> "$GITHUB_ENV"

      - name: Attach DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}