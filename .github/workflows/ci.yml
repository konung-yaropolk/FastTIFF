name: CI

# Runs the full workspace test suite on pushes to main (and PRs targeting it),
# so the "tests" badge reflects current health between releases — not just the
# last published release. Windows matches the release environment there, where
# the default (wgpu/DX12) app builds without any extra system packages.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

      # The test run above exercises the default (wgpu) backend. glow is the
      # Linux release backend but isn't otherwise compiled here, so a glow-only
      # break would stay green until a release build fails. This compile-only
      # check catches that (glow links just OpenGL — no extra system packages).
      - name: Build glow backend
        run: cargo build -p FastTIFF --no-default-features --features renderer-glow
