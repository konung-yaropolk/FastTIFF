name: CI

# Runs the full workspace test suite on pushes to main (and PRs targeting it),
# so the "tests" badge reflects current health between releases — not just the
# last published release. One job per OS, because each platform compiles code
# the others exclude (`#[cfg(target_os = ...)]` gates + target-gated deps in
# FastTIFF/Cargo.toml): Windows = winres build script; macOS = the
# macos_open.rs open-file FFI (+ its unit tests); Linux = the x11/wayland
# eframe features and the glow release backend. Without per-OS jobs, a break
# behind another platform's gate stays green until its release build fails.
#
# build.rs embeds the committed icon/icon.ico into the .exe via winres; the icon
# is pre-rendered from icon.svg by tools/generate-icons.bat and committed, so no
# rasterization happens here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Windows matches the .exe release environment: default (wgpu/DX12) backend,
  # no extra system packages.
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

      # The test run above exercises the default (wgpu) backend. glow is the
      # Linux release backend; the compile check here (in addition to the Linux
      # job below) catches Windows-specific glow breakage cheaply.
      - name: Build glow backend
        run: cargo build -p FastTIFF --no-default-features --features renderer-glow

  # macOS compiles the `#[cfg(target_os = "macos")]` code no other job sees —
  # the macos_open.rs "Open With" FFI — and runs its unit tests. arm64, matching
  # the primary .dmg release target.
  test-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # Linux compiles the target-gated x11/wayland eframe features with the glow
  # backend — the exact configuration the .deb / Arch release jobs ship. Same
  # build-time system libs as the release deb job.
  test-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgtk-3-dev libgl1-mesa-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxkbcommon-dev libwayland-dev

      - name: Run tests (glow backend)
        run: cargo test --workspace --no-default-features --features FastTIFF/renderer-glow