name: CI

# Runs the full workspace test suite on pushes to main (and PRs targeting it),
# so the "tests" badge reflects current health between releases — not just the
# last published release. Windows matches the release environment there, where
# the default (wgpu/DX12) app builds without any extra system packages.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # build.rs embeds icon/icon.ico into the .exe via winres, and the icon is
      # generated from icon.svg at build time (not committed), so it must exist
      # before any cargo build/test that triggers build.rs. Rasterize it here
      # with ImageMagick (preinstalled on windows-latest). Without this, the
      # winres step would warn about a missing icon and the .exe would build
      # without one — harmless for tests, but this keeps CI faithful to release.
      - name: Generate Windows icon (.ico) from SVG
        shell: bash
        run: |
          set -euo pipefail
          cd FastTIFF/icon
          for s in 16 32 48 64 128 256; do
            magick -background none icon.svg -resize ${s}x${s} "ico_${s}.png"
          done
          magick ico_16.png ico_32.png ico_48.png ico_64.png ico_128.png ico_256.png icon.ico
          rm -f ico_*.png

      - name: Run tests
        run: cargo test --workspace

      # The test run above exercises the default (wgpu) backend. glow is the
      # Linux release backend but isn't otherwise compiled here, so a glow-only
      # break would stay green until a release build fails. This compile-only
      # check catches that (glow links just OpenGL — no extra system packages).
      - name: Build glow backend
        run: cargo build -p FastTIFF --no-default-features --features renderer-glow