[package]
name = "FastTIFF"
version = "1.2.6"
edition = "2021"
description = "A lightning-fast multi-frame TIFF viewer with ImageJ-compatible rendering."

[dependencies]
tiff_core = { path = "../tiff_core" }
# glow is the renderer (it avoids the Windows+wgpu idle-CPU spin). default
# features are off to drop `accesskit` (unused accessibility layer) and `wgpu`
# (no longer used); `default_fonts` keeps the bundled text fonts.
eframe = { version = "0.34", default-features = false, features = ["glow", "default_fonts"] }
egui = "0.34"
egui_extras = "0.34"
bytemuck = "1.25"
anyhow = "1.0"
rfd = "0.17"
log = "0.4"
env_logger = "0.11"

# Only needed on Windows, where build.rs embeds the icon + version metadata
# as a Win32 resource. Gated so non-Windows builds don't pull winres in.
[target.'cfg(windows)'.build-dependencies]
winres = "0.1.12"

[package.metadata.winres]
OriginalFilename = "FastTIFF"
LegalCopyright = "konung_yaropolk © 2026"
FileDescription = "Fast TIFF Viewer"
ProductName = "Fast TIFF Viewer"
